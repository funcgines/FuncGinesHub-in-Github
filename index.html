<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FuncGinesHub</title><link rel="icon" href="icon.png"><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#fff;color:#111;max-width:720px;margin:60px auto;padding:0 24px;line-height:1.6}h1{font-weight:600;font-size:28px;margin:0 0 24px}a{display:block;padding:14px 0;border-bottom:1px solid #f0f0f0;text-decoration:none;color:#111}a:hover{background:#fafafa}</style></head><body><h1>FuncGinesHub</h1><div id="l"></div><script>fetch('link.json').then(r=>r.json()).then(d=>l.innerHTML=d.map(i=>`<a href="${i.url}" target="_blank" rel="noopener">${i.name}</a>`).join('')).catch(()=>l.innerHTML='Error')</script></body></html>
